name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Ручной запуск

# Разрешения для записи в репозиторий
permissions:
  contents: read
  pages: write
  id-token: write

# Запуск только одного деплоя одновременно
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Установка зависимостей
        run: yarn install --frozen-lockfile

      - name: Генерация статики
        run: yarn generate
        env:
          NODE_ENV: production
          NUXT_APP_BASE_URL: '/palmacode_insta/'

      - name: Проверка сгенерированных файлов
        run: |
          echo "Содержимое .output/public:"
          ls -la .output/public/
          echo "Содержимое .output/public/_nuxt:"
          ls -la .output/public/_nuxt/ || echo "Папка _nuxt не найдена"

      - name: Загрузка артефактов
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Деплой на GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4